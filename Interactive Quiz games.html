<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2, #ff758c);
      background-size: 300% 300%;
      animation: gradientBG 8s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .quiz-container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 350px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    .option {
      display: block;
      margin: 10px 0;
      padding: 10px;
      background: #eee;
      border-radius: 5px;
      cursor: pointer;
    }

    .option:hover {
      background: #ddd;
    }

    button {
      margin-top: 15px;
      padding: 10px 15px;
      border: none;
      background: #333;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: #555;
    }
  </style>
</head>
<body>

<div class="quiz-container">
  <h2 id="question">Question here</h2>
  <div id="options"></div>
  <button onclick="nextQuestion()">Next</button>
  <p id="score"></p>
</div>

<script>
  const quiz = [
    {
      question: "What is 2 + 2?",
      options: ["3", "4", "5", "6"],
      answer: "4"
    },
    {
      question: "Capital of India?",
      options: ["Mumbai", "Delhi", "Chennai", "Kolkata"],
      answer: "Delhi"
    },
    {
      question: "Which language runs in browser?",
      options: ["Python", "Java", "C++", "JavaScript"],
      answer: "JavaScript"
    }
  ];

  let current = 0;
  let score = 0;
  let selected = null;

  function loadQuestion() {
    const q = quiz[current];
    document.getElementById("question").innerText = q.question;
    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    q.options.forEach(option => {
      const div = document.createElement("div");
      div.classList.add("option");
      div.innerText = option;
      div.onclick = () => selectOption(option, div);
      optionsDiv.appendChild(div);
    });
  }

  function selectOption(option, element) {
    selected = option;
    document.querySelectorAll(".option").forEach(el => el.style.background = "#eee");
    element.style.background = "#bbb";
  }

  function nextQuestion() {
    if (selected === quiz[current].answer) {
      score++;
    }

    selected = null;
    current++;

    if (current < quiz.length) {
      loadQuestion();
    } else {
      document.querySelector(".quiz-container").innerHTML = `
        <h2>Quiz Finished!</h2>
        <p>Your Score: ${score} / ${quiz.length}</p>
        <button onclick="location.reload()">Restart</button>
      `;
    }
  }

  loadQuestion();
</script>

</body>
</html>
